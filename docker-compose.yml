services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - USE_MOCK_SEARCH=true
      - USE_MOCK_LLM=true
      - DATABASE_URL=sqlite:///./data/app.db
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:
